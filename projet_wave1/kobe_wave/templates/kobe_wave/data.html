{% extends 'kobe_wave/base.html' %}
{% block title %}Data{% endblock %}

{% block content %}
<div class="container-fluid py-4 px-4">

<h1 style="color:#0b1f3a;">Explore the data</h1>

<!-- ROW 1 -->
<div class="row g-4 mb-5">
    <div class="col-md-4">
        <p style="color:white; text-align:justify;">
            This network graph links keywords that co-occur in article titles.
        </p>
    </div>

    <div class="col-md-8">
        <div class="card shadow-sm border-0 p-3">

            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 style="color:#0b1f3a;">🕸️ Co-occurrence Network</h6>

                <div class="d-flex gap-2">
                    <input id="searchWord" class="form-control form-control-sm" style="width:180px;" placeholder="Search...">
                    <button id="btnSearch" class="btn btn-sm btn-outline-warning">Search</button>
                    <button id="btnReset" class="btn btn-sm btn-outline-secondary">Reset</button>
                </div>
            </div>

            <div id="networkChart" style="height:560px;"></div>

            <div id="networkPanel" class="mt-3" style="display:none;">
                <h6>Articles: <span id="networkWord"></span></h6>
                <div id="networkArticles" class="list-group"></div>
            </div>

        </div>
    </div>
</div>

<!-- ROW 2 -->
<div class="row g-4 mb-5">
    <div class="col-md-8">
        <div class="card p-3">
            <h6 style="color:#0b1f3a;">🌐 Radial Chart</h6>
            <div id="radialChart" style="height:520px;"></div>
        </div>
    </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<script>
const PALETTE = ['#4f86f7','#f7a44f','#4fc97a','#ef4444','#a855f7'];

let chart;
let selectedNode = null;
let selectedEdge = null;
let rawNodes = [];
let rawLinks = [];

// ─────────────────────────────
// NETWORK GRAPH
// ─────────────────────────────
fetch('/api/cooccurrence/')
.then(r => r.json())
.then(data => {

    chart = echarts.init(document.getElementById('networkChart'));

    rawNodes = data.nodes;
    rawLinks = data.links;

    const maxVal = Math.max(...rawNodes.map(n => n.value), 1);

    function nodeColor(v) {
        const i = Math.floor((v / maxVal) * (PALETTE.length - 1));
        return PALETTE[i];
    }

    function render() {
        chart.setOption({
            backgroundColor: '#ffffff',

            tooltip: {
                trigger: 'item',
                confine: true,
                formatter: p => {
                    if (p.dataType === 'edge') {
                        return `${p.data.source} ↔ ${p.data.target}<br>${p.data.value}`;
                    }
                    return `${p.name}<br>${p.data.value}`;
                }
            },

            series: [{
                type: 'graph',
                layout: 'circular',
                data: rawNodes.map(n => ({
                    name: n.id,
                    value: n.value,
                    symbolSize: 10 + (n.value / maxVal) * 40,
                    itemStyle: {
                        color: nodeColor(n.value),
                        borderColor: '#fff',
                        borderWidth: 1
                    }
                })),
                links: rawLinks,
                roam: true,
                emphasis: {
                    focus: 'adjacency'
                }
            }]
        });
    }

    render();

    window.addEventListener('resize', () => chart.resize());

    // ───── NODE CLICK ─────
    chart.on('click', { dataType: 'node' }, p => {
        selectedNode = p.name;
        selectedEdge = null;

        highlight();
        loadArticles(p.name);
    });

    // ───── EDGE CLICK ─────
    chart.on('click', { dataType: 'edge' }, p => {
        selectedEdge = {
            source: p.data.source,
            target: p.data.target
        };
        selectedNode = null;

        highlight();
        loadCooccurrence(p.data.source, p.data.target);
    });

    // ───── SEARCH (simple filter) ─────
    document.getElementById('btnSearch').addEventListener('click', () => {
        const w = document.getElementById('searchWord').value.toLowerCase();
        const found = rawNodes.find(n => n.id === w);

        if (!found) return alert("Not found");

        selectedNode = w;
        selectedEdge = null;

        highlight();
        loadArticles(w);
    });

    // ───── RESET ─────
    document.getElementById('btnReset').addEventListener('click', () => {
        selectedNode = null;
        selectedEdge = null;

        document.getElementById('networkPanel').style.display = 'none';

        render();
    });

    // ─────────────────────────────
    // HIGHLIGHT FUNCTION
    // ─────────────────────────────
    function highlight() {

        const nodes = rawNodes.map(n => {

            const active = selectedNode === n.id;

            const linked = selectedNode && rawLinks.some(l =>
                l.source === n.id || l.target === n.id
            );

            return {
                name: n.id,
                value: n.value,
                symbolSize: 10 + n.value,
                itemStyle: {
                    color: selectedNode
                        ? (active ? '#facc15' : linked ? '#4f86f7' : '#ddd')
                        : '#4f86f7'
                }
            };
        });

        const links = rawLinks.map(l => {

            const activeEdge = selectedEdge &&
                l.source === selectedEdge.source &&
                l.target === selectedEdge.target;

            const related = selectedNode &&
                (l.source === selectedNode || l.target === selectedNode);

            return {
                ...l,
                lineStyle: {
                    color: activeEdge || related ? '#f97316' : '#aaa',
                    width: activeEdge ? 4 : related ? 2 : 1,
                    opacity: selectedNode || selectedEdge ? 0.9 : 0.4
                }
            };
        });

        chart.setOption({
            series: [{ data: nodes, links }]
        });
    }

    // ─────────────────────────────
    // API LOADERS
    // ─────────────────────────────
    function loadArticles(word) {
        document.getElementById('networkWord').innerText = word;
        document.getElementById('networkPanel').style.display = 'block';

        fetch(`/api/articles/?q=${word}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('networkArticles').innerHTML =
                data.map(a => `
                    <a class="list-group-item" href="/articles/${a.id_articles}/">
                        ${a.title}
                    </a>
                `).join('');
        });
    }

    function loadCooccurrence(w1, w2) {
        document.getElementById('networkWord').innerText = `${w1} ↔ ${w2}`;
        document.getElementById('networkPanel').style.display = 'block';

        fetch(`/api/articles-cooccurrence/?w1=${w1}&w2=${w2}`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('networkArticles').innerHTML =
                data.map(a => `
                    <a class="list-group-item" href="/articles/${a.id_articles}/">
                        ${a.title}
                    </a>
                `).join('');
        });
    }

});
</script>

{% endblock %}
