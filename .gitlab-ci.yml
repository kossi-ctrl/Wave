image: python:3.11-slim

stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DJANGO_SETTINGS_MODULE: "projet_wave1.settings"

cache:
  paths:
    - .cache/pip/

default:
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements-dev.txt

lint:flake8:
  stage: lint
  script:
    flake8 . --max-line-length=100 --extend-ignore=E203 --exclude=env/,venv/,migrations/,Echarts/,fichiers_code_jmerise/,sanstitre3.py
  allow_failure: false

test:unit:
  stage: test
  services:
    - postgres:15
  variables:
    POSTGRES_DB: wave_kobe_db
    POSTGRES_USER: wave_kobe
    POSTGRES_PASSWORD: testpassword
    POSTGRES_HOST_AUTH_METHOD: trust
    PGDATABASE: wave_kobe_db
    PGUSER: wave_kobe
    PGPASSWORD: testpassword
    PGHOST: postgres
    PGPORT: "5432"
    SECRET_KEY: "test-secret-key-for-ci"
    DEBUG: "True"
    CLOUDINARY_CLOUD_NAME: "test"
    CLOUDINARY_API_KEY: "test"
    CLOUDINARY_API_SECRET: "test"
  script:
    - cd projet_wave1
    - python3 -m coverage run manage.py test kobe_wave
    - python3 -m coverage report
    - python3 -m coverage xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: projet_wave1/coverage.xml
    expire_in: 3 months
  allow_failure: false